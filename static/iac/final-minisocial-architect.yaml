AWSTemplateFormatVersion: '2010-09-09'
Description: 'Ha tang AWS CloudFormation CHUAN ENTERPRISE (VPC Multi-AZ, NAT Gateway, HTTPS ALB, SSM Parameters) cho Mini Social Network'

# =========================================================================
# PARAMETERS: Nhận giá trị động từ bên ngoài thay vì Hardcode
# =========================================================================
Parameters:
  AcmCertificateArnParam:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /minisocial/acm/certificate-arn
    Description: "Đường dẫn Parameter Store chứa ARN của chứng chỉ SSL/TLS (ACM)"

Resources:
  # 1. TẠO MẠNG ẢO (VPC)
  MyVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: MiniSocial-VPC

  # 2. TẠO CỬA NGÕ INTERNET (IGW)
  MyInternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: MiniSocial-IGW
  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref MyVPC
      InternetGatewayId: !Ref MyInternetGateway

  # 3. TẠO PUBLIC SUBNETS (AZ-1 và AZ-2)
  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [ 0, !GetAZs '' ]
      Tags:
        - Key: Name
          Value: MiniSocial-PublicSubnet-1
  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: 10.0.2.0/24
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [ 1, !GetAZs '' ]
      Tags:
        - Key: Name
          Value: MiniSocial-PublicSubnet-2

  # 4. TẠO PRIVATE SUBNETS (AZ-1 và AZ-2)
  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: 10.0.3.0/24
      AvailabilityZone: !Select [ 0, !GetAZs '' ]
      Tags:
        - Key: Name
          Value: MiniSocial-PrivateSubnet-Compute
  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: 10.0.4.0/24
      AvailabilityZone: !Select [ 1, !GetAZs '' ]
      Tags:
        - Key: Name
          Value: MiniSocial-PrivateSubnet-Data
  PrivateSubnet3:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: 10.0.5.0/24
      AvailabilityZone: !Select [ 1, !GetAZs '' ] # Nằm ở AZ-2 cùng với Data
      Tags:
        - Key: Name
          Value: MiniSocial-PrivateSubnet-Compute-AZ2

  # 5. ĐỊNH TUYẾN CHO PUBLIC SUBNETS (Ra Internet qua IGW)
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref MyVPC
      Tags:
        - Key: Name
          Value: MiniSocial-Public-RT
  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref MyInternetGateway
  PublicSubnet1RouteAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable
  PublicSubnet2RouteAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  # 6. TẠO NAT GATEWAY VÀ ĐỊNH TUYẾN CHO PRIVATE SUBNETS
  NatEIP:
    Type: AWS::EC2::EIP
    DependsOn: AttachGateway
    Properties:
      Domain: vpc
  MyNatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEIP.AllocationId
      SubnetId: !Ref PublicSubnet1
      Tags:
        - Key: Name
          Value: MiniSocial-NATGW
  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref MyVPC
      Tags:
        - Key: Name
          Value: MiniSocial-Private-RT
  PrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref MyNatGateway
  PrivateSubnet1RouteAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable
  PrivateSubnet2RouteAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable
  PrivateSubnet3RouteAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet3
      RouteTableId: !Ref PrivateRouteTable

  # 7. TẠO BẢO MẬT (SECURITY GROUPS)
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Cho phep traffic HTTP (80) va HTTPS (443) tu Internet vao ALB
      VpcId: !Ref MyVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: MiniSocial-ALB-SG

  BackendSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Chi cho phep traffic tu ALB di vao Backend (Port 8080)
      VpcId: !Ref MyVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          SourceSecurityGroupId: !Ref ALBSecurityGroup
      Tags:
        - Key: Name
          Value: MiniSocial-Backend-SG

  # 8. TẠO BỘ CÂN BẰNG TẢI (APPLICATION LOAD BALANCER)
  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: MiniSocial-ALB
      Scheme: internet-facing
      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      SecurityGroups:
        - !Ref ALBSecurityGroup
      Tags:
        - Key: Name
          Value: MiniSocial-ALB
      LoadBalancerAttributes:
        - Key: idle_timeout.timeout_seconds
          Value: '3600'

  # 9. ALB TARGET GROUP & LISTENERS
  BackendTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: MiniSocial-Backend-TG
      Port: 8080
      Protocol: HTTP
      VpcId: !Ref MyVPC
      TargetType: ip
      TargetGroupAttributes: 
        - Key: stickiness.enabled
          Value: 'true'
        - Key: stickiness.type
          Value: 'lb_cookie'
      HealthCheckPath: /api/health/status
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3

  ALBListenerHTTP:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: redirect
          RedirectConfig:
            Protocol: HTTPS
            Port: '443'
            Host: '#{host}'
            Path: '/#{path}'
            Query: '#{query}'
            StatusCode: HTTP_301

  ALBListenerHTTPS:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 443
      Protocol: HTTPS
      Certificates:
        # 🟢 Lấy tự động ARN chứng chỉ từ Parameter Store thay vì Hardcode
        - CertificateArn: !Ref AcmCertificateArnParam
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref BackendTargetGroup

  # 10. TẠO ECS CLUSTER
  MyECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: MiniSocial-Cluster

  # 11. TẠO S3 VPC GATEWAY ENDPOINT (TỐI ƯU CHI PHÍ NAT GW)
  S3VPCEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref MyVPC
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.s3"
      VpcEndpointType: Gateway
      RouteTableIds:
        - !Ref PrivateRouteTable # Gắn trực tiếp vào bảng định tuyến của các Private Subnet 

# =========================================================================
# OUTPUTS: Trích xuất các ID để dùng cho Stack Database và Backend sau này
# =========================================================================
Outputs:
  VPCId:
    Description: ID cua VPC
    Value: !Ref MyVPC
  PublicSubnet1:
    Description: ID Public Subnet 1
    Value: !Ref PublicSubnet1
  PublicSubnet2:
    Description: ID Public Subnet 2
    Value: !Ref PublicSubnet2
  PrivateSubnet1:
    Description: ID Private Subnet 1 (Dung cho ECS Fargate)
    Value: !Ref PrivateSubnet1
  PrivateSubnet2:
    Description: ID Private Subnet 2 (Dung cho RDS)
    Value: !Ref PrivateSubnet2
  PrivateSubnetCompute2:
    Description: ID Private Subnet Compute thu 2 (Dung cho ECS Fargate Multi-AZ)
    Value: !Ref PrivateSubnet3
  BackendSecurityGroupId:
    Description: SG cua Backend (Dung de cap quyen cho RDS Database)
    Value: !Ref BackendSecurityGroup
  ALBDNSName:
    Description: Link DNS cua Load Balancer (Map vao Route53 sau nay)
    Value: !GetAtt ApplicationLoadBalancer.DNSName
  BackendTargetGroupArn:
    Description: ARN cua Target Group (Dung cho Backend Service)
    Value: !Ref BackendTargetGroup